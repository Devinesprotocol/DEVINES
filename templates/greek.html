<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Greek Pantheon</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

.container{
position:relative;
width:600px;
height:600px;
margin:auto;
margin-top:50px;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
position:absolute;
cursor:pointer;
}

.center{
top:250px;
left:250px;
background:white;
color:black;
}

</style>

</head>

<body>

<h1>Greek Pantheon</h1>

<div class="container">

<div class="circle center" onclick="awake('CHAOS')">CHAOS</div>

</div>

<script>

function awake(entity){

alert("Awakening " + entity)

}

</script>

</body>

</html>
<button class="pantheon-btn">ARTEMIS</button>

<button class="pantheon-btn">DEMETER</button>

<button class="pantheon-btn">HEPHAESTUS</button>

<button class="pantheon-btn">APHRODITE</button>

<button class="pantheon-btn">HERMES</button>

<button class="pantheon-btn">DIONYSUS</button>

</div>

</div>

</body>

</html>
