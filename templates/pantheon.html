<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Pantheon</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
position:relative;
width:700px;
height:700px;
}

.node{
position:absolute;
width:100px;
height:100px;
border-radius:50%;
border:1px solid white;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.node:hover{
background:white;
color:black;
}

.center{
top:50%;
left:50%;
transform:translate(-50%,-50%);
position:absolute;
width:120px;
height:120px;
border-radius:60px;
border:2px solid white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="center" onclick="selectEntity('CHAOS')">CHAOS</div>

<script>

const gods=[
"ZEUS","HERA","POSEIDON","DEMETER",
"ATHENA","APOLLO","ARTEMIS","ARES",
"APHRODITE","HEPHAESTUS","HERMES","DIONYSUS"
]

const container=document.querySelector(".container")

gods.forEach((god,i)=>{

let angle=i*(360/gods.length)

let radius=300

let x=350+radius*Math.cos(angle*Math.PI/180)
let y=350+radius*Math.sin(angle*Math.PI/180)

let node=document.createElement("div")

node.className="node"

node.style.left=x+"px"
node.style.top=y+"px"

node.innerText=god

node.onclick=()=>selectEntity(god)

container.appendChild(node)

})

function selectEntity(name){

localStorage.setItem("entity",name)

window.location="chat.html"

}

</script>

</body>
</html>
